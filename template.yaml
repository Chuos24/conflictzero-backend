AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ConflictZero Backend - Serverless AWS

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        S3_BUCKET: conflictzero-documentos-prod
        DYNAMODB_TABLE: conflictzero-consultas
        ALLOWED_ORIGIN: https://czperu.com
        BUSCARUC_TOKEN: ''
    Layers:
      - !Ref SharedLayer

Resources:

  # ─── LAYER COMPARTIDO ───────────────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: conflictzero-shared
      Description: Utils compartidos (cache DynamoDB, CORS, validacion RUC)
      ContentUri: layers/shared/
      CompatibleRuntimes:
        - python3.11

  # ─── API GATEWAY ────────────────────────────────────────────────────
  ConflictZeroApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Sector'"
        AllowOrigin: "'https://czperu.com'"

  # ─── LAMBDA: HEALTH ─────────────────────────────────────────────────
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: conflictzero-health
      CodeUri: lambdas/health/
      Handler: handler.lambda_handler
      Role: arn:aws:iam::981207387949:role/conflictzero-lambda-role
      Events:
        HealthGet:
          Type: Api
          Properties:
            RestApiId: !Ref ConflictZeroApi
            Path: /health
            Method: GET

  # ─── LAMBDA: HOMOLOGACION (motor principal) ──────────────────────────
  HomologacionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: conflictzero-homologacion
      CodeUri: lambdas/homologacion/
      Handler: lambda_function.lambda_handler
      Role: arn:aws:iam::981207387949:role/conflictzero-lambda-role
      Timeout: 60
      Events:
        ConsultaGet:
          Type: Api
          Properties:
            RestApiId: !Ref ConflictZeroApi
            Path: /consulta/{ruc}
            Method: GET
        CertificadoGet:
          Type: Api
          Properties:
            RestApiId: !Ref ConflictZeroApi
            Path: /generar-certificado/{ruc}
            Method: GET
        AgentesGet:
          Type: Api
          Properties:
            RestApiId: !Ref ConflictZeroApi
            Path: /agentes
            Method: GET

  # ─── LAMBDA: CONSULTA RUC (SUNAT) — Fase 3 ──────────────────────────
  # ConsultaRucFunction:
  #   FunctionName: conflictzero-consulta-ruc
  #   CodeUri: lambdas/consulta-ruc/

  # ─── LAMBDA: SANCIONES OSCE/TCE — Fase 3 ────────────────────────────
  # ConsultaSancionesFunction:
  #   FunctionName: conflictzero-sanciones
  #   CodeUri: lambdas/sanciones/

  # ─── LAMBDA: SCORING — Fase 3 ────────────────────────────────────────
  # ScoringFunction:
  #   FunctionName: conflictzero-scoring
  #   CodeUri: lambdas/scoring/

  # ─── LAMBDA: CERTIFICADOS — Fase 3 ──────────────────────────────────
  # CertificadoFunction:
  #   FunctionName: conflictzero-certificado
  #   CodeUri: lambdas/certificado/

  # ─── DYNAMODB: CACHE DE CONSULTAS ───────────────────────────────────
  ConsultasTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: conflictzero-consultas
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  ApiUrl:
    Description: URL base de la API
    Value: !Sub 'https://${ConflictZeroApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
