version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cz_user
      POSTGRES_PASSWORD: cz_password
      POSTGRES_DB: conflict_zero
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cz_user -d conflict_zero"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (opcional - para cache)
  redis:
    image: redis:7-alpine
    container_name: cz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cz_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://cz_user:cz_password@db:5432/conflict_zero
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - ADMIN_TOKEN=admin-dev-token
      - CERT_MODE=demo
      - ENV=development
      - DEBUG=true
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Landing Page (nginx)
  landing:
    image: nginx:alpine
    container_name: cz_landing
    restart: unless-stopped
    ports:
      - "5500:80"
    volumes:
      - ./landing:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
