[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
markers =
    unit: Unit tests (fast, no DB)
    integration: Integration tests (require DB)
    slow: Slow tests (external APIs)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
