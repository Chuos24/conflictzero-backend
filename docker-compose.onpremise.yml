# Conflict Zero - On-Premise Deployment
# Docker Compose para despliegue en infraestructura del cliente

version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: cz-onpremise-db
    environment:
      POSTGRES_USER: ${DB_USER:-conflictzero}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-strong-password}
      POSTGRES_DB: ${DB_NAME:-conflict_zero}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - cz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-conflictzero} -d ${DB_NAME:-conflict_zero}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: cz-onpremise-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme-redis-pass}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - cz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cz-onpremise-backend
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-conflictzero}:${DB_PASSWORD:-changeme-strong-password}@db:5432/${DB_NAME:-conflict_zero}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme-redis-pass}@redis:6379/0
      
      # Security (DEBE cambiarse en producción)
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-in-production-32}
      
      # Environment
      ENVIRONMENT: production
      DEBUG: "false"
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      
      # Features
      EMAIL_ENABLED: "${EMAIL_ENABLED:-false}"
      ML_SCORING_ENABLED: "${ML_SCORING_ENABLED:-true}"
      
      # White-label
      WHITE_LABEL_ENABLED: "${WHITE_LABEL_ENABLED:-false}"
      TENANT_ID: ${TENANT_ID:-default}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: json
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - cz-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Dashboard (servido via Nginx)
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: cz-onpremise-dashboard
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:8000}
      VITE_TENANT_ID: ${TENANT_ID:-default}
    ports:
      - "${DASHBOARD_PORT:-5173}:80"
    networks:
      - cz-network
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx Reverse Proxy (opcional)
  nginx:
    image: nginx:alpine
    container_name: cz-onpremise-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - cz-network
    depends_on:
      - backend
      - dashboard
    restart: unless-stopped
    profiles:
      - with-nginx

  # Backup automático (opcional)
  backup:
    image: offen/docker-volume-backup:latest
    container_name: cz-onpremise-backup
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"  # 2 AM diario
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_FILENAME: conflict-zero-backup-%Y-%m-%dT%H-%M-%S.tar.gz
      AWS_S3_BUCKET_NAME: ${S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-}
      AWS_S3_ENDPOINT: ${S3_ENDPOINT:-}
    volumes:
      - postgres_data:/backup/postgres:ro
      - redis_data:/backup/redis:ro
      - backend_uploads:/backup/uploads:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - cz-network
    profiles:
      - with-backup

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local
  nginx_logs:
    driver: local

networks:
  cz-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
